name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git curl python3-pip python3-dev build-essential libssl-dev libffi-dev libxml2-dev libxslt1-dev zlib1g-dev openjdk-11-jdk wget unzip
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Set up Android SDK
      run: |
        # Create Android SDK directory
        mkdir -p ~/Android/Sdk
        
        # Download Android SDK Command Line Tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O sdk-tools.zip
        unzip -q sdk-tools.zip -d ~/Android/Sdk
        rm sdk-tools.zip
        
        # Set environment variables
        echo "ANDROID_HOME=~/Android/Sdk" >> ~/.bashrc
        echo "PATH=\$PATH:\$ANDROID_HOME/cmdline-tools/bin:\$ANDROID_HOME/platform-tools" >> ~/.bashrc
        source ~/.bashrc
        
        # Accept licenses and install required components
        yes | ~/Android/Sdk/cmdline-tools/bin/sdkmanager --licenses
        ~/Android/Sdk/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: boxboardcalculator-apk
        path: bin/*.apk
        retention-days: 30
