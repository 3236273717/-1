name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git curl python3-pip python3-dev build-essential libssl-dev libffi-dev libxml2-dev libxslt1-dev zlib1g-dev openjdk-17-jdk wget unzip autoconf libtool pkg-config libncurses5 libncurses5-dev libncursesw5-dev libreadline-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython==0.29.33
    
    - name: Build APK with buildozer
      run: |
        buildozer android debug
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: boxboardcalculator-apk
        path: bin/*.apk
        retention-days: 30
