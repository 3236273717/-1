name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git curl python3-pip python3-dev build-essential libssl-dev libffi-dev libxml2-dev libxslt1-dev zlib1g-dev openjdk-11-jdk wget unzip autoconf libtool pkg-config
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Setup Android SDK for buildozer
      run: |
        # Create the exact directory structure buildozer expects
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$SDK_DIR"
        
        # Download command line tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
        unzip -q commandlinetools-linux-10406996_latest.zip
        
        # Install to SDK directory
        mkdir -p "$SDK_DIR/cmdline-tools/latest"
        mv cmdline-tools/* "$SDK_DIR/cmdline-tools/latest/"
        rm -rf cmdline-tools commandlinetools-linux-10406996_latest.zip
        
        # Set up environment
        export ANDROID_HOME="$SDK_DIR"
        export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"
        
        # Accept licenses
        yes | sdkmanager --licenses
        
        # Install required packages
        sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
        
        # Verify installation
        echo "SDK Directory: $SDK_DIR"
        ls -la "$SDK_DIR"
        ls -la "$SDK_DIR/build-tools/" || echo "build-tools not found"
        which aidl || echo "aidl not in PATH"
    
    - name: Build APK
      run: |
        export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
        export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/31.0.0"
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: boxboardcalculator-apk
        path: bin/*.apk
        retention-days: 30
